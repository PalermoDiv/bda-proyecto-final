{% extends "portal_familiar/base_familiar.html" %}

{% block title %}Iniciar sesión — Portal Familiar{% endblock %}

{% block content %}

<div style="max-width:380px; margin:40px auto 0;">

    <div style="text-align:center; margin-bottom:28px;">
        <div style="width:52px; height:52px; border-radius:14px; background:#E0F2FE;
                    display:flex; align-items:center; justify-content:center; margin:0 auto 14px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0E7490" stroke-width="2" width="24" height="24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>
        <div style="font-size:20px; font-weight:700; color:#0F172A; letter-spacing:-0.3px;">
            Portal Familiar
        </div>
        <div style="font-size:13px; color:#64748B; margin-top:4px;">
            Accede para ver el estado de tu familiar
        </div>
    </div>

    <div class="pf-card">
        <div class="pf-card-body">
            <form method="POST" action="{{ url_for('portal_login') }}">

                <div style="margin-bottom:16px;">
                    <label style="display:block; font-size:12px; font-weight:600;
                                  color:#475569; margin-bottom:6px;">
                        Correo electrónico
                    </label>
                    <input type="email" name="email" required
                           placeholder="tu@correo.com"
                           style="width:100%; padding:10px 14px; border:1px solid #CBD5E1;
                                  border-radius:8px; font-size:14px; font-family:inherit;
                                  color:#0F172A; outline:none;"
                           onfocus="this.style.borderColor='#0E7490'"
                           onblur="this.style.borderColor='#CBD5E1'">
                </div>

                <div style="margin-bottom:22px;">
                    <label style="display:block; font-size:12px; font-weight:600;
                                  color:#475569; margin-bottom:6px;">
                        PIN de acceso
                    </label>
                    <input type="password" name="pin" required
                           placeholder="••••"
                           maxlength="20"
                           style="width:100%; padding:10px 14px; border:1px solid #CBD5E1;
                                  border-radius:8px; font-size:14px; font-family:inherit;
                                  color:#0F172A; outline:none;"
                           onfocus="this.style.borderColor='#0E7490'"
                           onblur="this.style.borderColor='#CBD5E1'">
                </div>

                <button type="submit"
                        style="width:100%; padding:11px; background:#0E7490; color:#fff;
                               font-size:14px; font-weight:600; font-family:inherit;
                               border:none; border-radius:8px; cursor:pointer;">
                    Entrar
                </button>

            </form>
        </div>
    </div>

    <div style="text-align:center; font-size:11px; color:#94A3B8; margin-top:16px;">
        ¿Problemas para acceder? Contacta a la administración de la residencia.
    </div>

</div>

{% endblock %}

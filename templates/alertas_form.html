{% extends "base.html" %}

{% block title %}Registrar alerta{% endblock %}
{% block page_title %}Registrar alerta{% endblock %}
{% block breadcrumb %}
    Inicio /
    <a href="{{ url_for('alertas.alertas') }}" style="color:#185fa5;">Alertas</a> /
    Nueva
{% endblock %}

{% block content %}

<div style="max-width:680px;">
    <div class="card">
        <div class="card-header">
            <div class="card-title">Registrar nueva alerta</div>
        </div>

        <div class="card-body">
            <form method="POST" action="{{ url_for('alertas.alertas_nueva') }}">

                <div class="form-group">
                    <label class="form-label" for="id_paciente">
                        Paciente
                        <span style="font-size:11px; color:#94A3B8; font-weight:400;">(opcional — dejar vacío para alerta de zona)</span>
                    </label>
                    <select id="id_paciente" name="id_paciente" class="form-control">
                        <option value="">— Sin paciente específico —</option>
                        {% for p in pacientes %}
                        <option value="{{ p.id_paciente }}">{{ p.nombre_completo }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="tipo_alerta">Tipo de alerta</label>
                        <select id="tipo_alerta" name="tipo_alerta" class="form-control" required>
                            <option value="" disabled selected>Seleccionar tipo...</option>
                            {% for t in tipos %}
                            <option value="{{ t.tipo_alerta }}">{{ t.tipo_alerta }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="fecha_hora">Fecha y hora</label>
                        <input type="datetime-local" id="fecha_hora" name="fecha_hora"
                               class="form-control"
                               value="{{ default_dt }}" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Registrar alerta
                    </button>
                    <a href="{{ url_for('alertas.alertas') }}" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}

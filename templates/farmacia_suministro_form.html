{% extends "base.html" %}

{% block title %}Nueva orden de suministro{% endblock %}
{% block page_title %}Nueva orden de suministro{% endblock %}
{% block breadcrumb %}
    Inicio /
    <a href="{{ url_for('farmacia') }}" style="color:#185fa5;">Farmacia</a> /
    Nueva orden
{% endblock %}

{% block content %}

<div style="max-width:680px;">
    <div class="card">
        <div class="card-header">
            <div class="card-title">Registrar orden de suministro</div>
        </div>

        <div class="card-body">
            <form method="POST" action="{{ url_for('farmacia_suministro_nuevo') }}">

                <div class="form-group">
                    <label class="form-label" for="id_suministro">ID de la orden</label>
                    <input type="number" id="id_suministro" name="id_suministro"
                           class="form-control" placeholder="Ej. 10" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="id_farmacia">Farmacia proveedora</label>
                        <select id="id_farmacia" name="id_farmacia" class="form-control" required>
                            <option value="" disabled selected>Seleccionar farmacia...</option>
                            {% for f in farmacias %}
                            <option value="{{ f.id_farmacia }}">{{ f.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="id_sede">Sede destino</label>
                        <select id="id_sede" name="id_sede" class="form-control" required>
                            <option value="" disabled selected>Seleccionar sede...</option>
                            {% for s in sedes %}
                            <option value="{{ s.id_sede }}">{{ s.nombre_sede }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="fecha_entrega">Fecha de entrega esperada</label>
                        <input type="date" id="fecha_entrega" name="fecha_entrega"
                               class="form-control" value="{{ fecha_hoy }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="estado">Estado</label>
                        <select id="estado" name="estado" class="form-control" required>
                            <option value="Pendiente" selected>Pendiente</option>
                            <option value="Entregado">Entregado</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Registrar orden
                    </button>
                    <a href="{{ url_for('farmacia') }}" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
